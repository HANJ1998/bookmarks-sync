name: Release

on:
  push:
    branches: [main]
    paths: ['src/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: echo "tag=v$(jq -r '.version' src/manifest.json)" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build extension zip
        if: steps.check.outputs.exists == 'false'
        run: |
          cd src
          zip -r ../bookmarks-sync-${{ steps.version.outputs.tag }}.zip \
            manifest.json background.js webdav.js \
            popup.html popup.js options.html options.js \
            icons/

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.tag }}"
          body: |
            一键书签同步 v${{ steps.version.outputs.tag }}

            ## 安装
            1. 下载 zip 并解压
            2. 打开 Chrome/Edge → 扩展管理 → 开发者模式
            3. 加载解压缩的扩展 → 选择 `src/` 目录
          files: bookmarks-sync-${{ steps.version.outputs.tag }}.zip
